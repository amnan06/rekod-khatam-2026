<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F6E56">
<title>Rekod Khatam Al-Quran 2026 — SJK(C) Ladang Grisek</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;--teal-light:#1D9E75;--teal-50:#E1F5EE;--teal-100:#9FE1CB;
  --green:#3B6D11;--green-50:#EAF3DE;
  --amber:#854F0B;--amber-50:#FAEEDA;--amber-400:#BA7517;
  --red:#A32D2D;--red-50:#FCEBEB;--red-400:#E24B4A;
  --blue:#185FA5;--blue-50:#E6F1FB;--blue-400:#378ADD;
  --bg:#F6FAF8;--surface:#fff;--border:#E2EDE9;
  --text:#1a2e28;--text2:#4a7060;--text3:#8aaa9e;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;
}

/* NAV */
nav{
  background:var(--teal);color:#fff;padding:0 16px;
  display:flex;align-items:center;position:sticky;top:0;z-index:50;
}
.nav-brand{display:flex;align-items:center;gap:10px;padding:10px 0}
.nav-tabs{display:flex;gap:10px;margin-left:20px}
.nav-tab{cursor:pointer;padding:10px;opacity:.8}
.nav-tab.active{opacity:1;border-bottom:2px solid #fff}

/* PAGE */
.page{display:none;padding:16px}
.page.active{display:block}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}

/* BUTTON */
.btn{padding:6px 10px;border-radius:6px;border:1px solid #ccc;cursor:pointer}
.btn-primary{background:var(--teal);color:#fff;border:none}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid #eee;padding:8px;font-size:13px}

/* SIMPLE UI */
.hidden{display:none}
</style>
</head>

<body>

<nav>
  <div class="nav-brand">📖 Khatam 2026</div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="show('dashboard')">Dashboard</div>
    <div class="nav-tab" onclick="show('murid')">Murid</div>
    <div class="nav-tab" onclick="show('rekod')">Rekod</div>
  </div>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <div class="card">
    <h3>📊 Dashboard</h3>
    <p>Rekod Khatam Al-Quran Tahun 6 - 2026</p>
  </div>
</div>

<!-- MURID -->
<div id="murid" class="page">
  <div class="card">
    <h3>👥 Senarai Murid</h3>
    <button class="btn btn-primary">+ Tambah Murid</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Status</th>
          <th>Muka Surat</th>
        </tr>
      </thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
</div>

<!-- REKOD -->
<div id="rekod" class="page">
  <div class="card">
    <h3>📝 Rekod Bacaan</h3>
    <p>Sistem rekod asas</p>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwgjSOm6pEjRVQ4KBZW-CjBej239XN9UmG1WHtYL17Db63UOog8GWS_wFKoY89ye3Sz5A/exec";

let murid = JSON.parse(localStorage.getItem("murid")) || [
  {nama:"Ahmad Aryan", status:"Aktif", ms:120},
  {nama:"Aina Insyirah", status:"Aktif", ms:450},
  {nama:"Muhammad Ikram", status:"Aktif", ms:300}
];

function render(){
  document.getElementById("tbl").innerHTML =
    murid.map(m=>`
      <tr>
        <td>${m.nama}</td>
        <td>${m.status}</td>
        <td>${m.ms}</td>
      </tr>
    `).join("");
  localStorage.setItem("murid", JSON.stringify(murid));
}

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

render();
</script>

</body>
</html>
