<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekod Khatam Al-Quran 2026 (STABLE)</title>

<style>
body{font-family:Arial;background:#f6faf8;margin:0}
nav{background:#0F6E56;color:#fff;padding:12px;display:flex;gap:10px}
nav button{background:transparent;border:0;color:#fff;cursor:pointer;font-weight:bold}
nav button.active{border-bottom:2px solid #fff}

.page{display:none;padding:16px}
.page.active{display:block}

.card{background:#fff;padding:12px;border-radius:10px;margin-bottom:10px;border:1px solid #ddd}

table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:8px;border-bottom:1px solid #eee;font-size:13px}

input,select{padding:6px;margin:4px 0;width:100%}
button{padding:6px 10px;cursor:pointer}
.btn{background:#0F6E56;color:#fff;border:0;border-radius:6px}
.btn-red{background:#c0392b;color:#fff;border:0;border-radius:6px}
.small{font-size:12px;color:#555}
</style>
</head>

<body>

<nav>
  <button onclick="show('dash')" class="active">Dashboard</button>
  <button onclick="show('murid')">Murid</button>
</nav>

<!-- DASHBOARD -->
<div id="dash" class="page active">
  <div class="card">
    <h3>📊 Dashboard Stabil</h3>
    <p id="stat"></p>
  </div>
</div>

<!-- MURID -->
<div id="murid" class="page">

  <div class="card">
    <h3>Tambah Murid</h3>
    <input id="nama" placeholder="Nama murid">
    <input id="ms" type="number" placeholder="Muka surat">
    <button class="btn" onclick="add()">+ Tambah</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>MS</th>
          <th>Status</th>
          <th>Tindakan</th>
        </tr>
      </thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>

</div>

<script>
let murid = JSON.parse(localStorage.getItem("murid")) || [
  {id:1,nama:"Ahmad Aryan",ms:120},
  {id:2,nama:"Aina Insyirah",ms:450},
  {id:3,nama:"Ikram",ms:300}
];

function save(){
  localStorage.setItem("murid", JSON.stringify(murid));
}

function render(){
  document.getElementById("tbl").innerHTML =
    murid.map(m=>`
      <tr>
        <td>${m.nama}</td>
        <td>${m.ms}</td>
        <td>${m.ms>=604?"Khatam":"Aktif"}</td>
        <td>
          <button onclick="edit(${m.id})">Edit</button>
          <button class="btn-red" onclick="del(${m.id})">X</button>
        </td>
      </tr>
    `).join("");

  let total = murid.length;
  let khatam = murid.filter(m=>m.ms>=604).length;

  document.getElementById("stat").innerText =
    `Jumlah murid: ${total} | Khatam: ${khatam}`;
}

function add(){
  let nama = document.getElementById("nama").value;
  let ms = parseInt(document.getElementById("ms").value)||0;

  if(!nama) return alert("Isi nama");

  murid.push({id:Date.now(),nama,ms});
  save(); render();

  document.getElementById("nama").value="";
  document.getElementById("ms").value="";
}

function edit(id){
  let m = murid.find(x=>x.id===id);
  let newMs = prompt("Update MS:", m.ms);
  if(newMs!==null){
    m.ms=parseInt(newMs)||0;
    save();render();
  }
}

function del(id){
  if(confirm("Padam murid?")){
    murid = murid.filter(x=>x.id!==id);
    save();render();
  }
}

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

render();
</script>

</body>
</html>
