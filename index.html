<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F6E56">
<title>Rekod Khatam Al-Quran 2026 — SJK(C) Ladang Grisek</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;--teal-light:#1D9E75;--teal-50:#E1F5EE;
  --green:#3B6D11;--amber:#854F0B;--red:#A32D2D;
  --blue:#185FA5;--bg:#F6FAF8;--surface:#fff;
  --border:#E2EDE9;--text:#1a2e28;--text2:#4a7060;
}
body{font-family:sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* NAV */
nav{background:var(--teal);color:#fff;padding:10px;display:flex;gap:10px;position:sticky;top:0}
.nav-tab{cursor:pointer;padding:8px}

/* PAGE */
.page{display:none;padding:16px}
.page.active{display:block}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}

/* BUTTON */
.btn{padding:6px 10px;border:1px solid #ccc;border-radius:6px;cursor:pointer}
.btn-primary{background:var(--teal);color:#fff;border:none}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid #eee;padding:8px;font-size:13px}

/* SIMPLE */
.hidden{display:none}
</style>
</head>

<body>

<nav>
  <div class="nav-tab" onclick="show('dashboard')">Dashboard</div>
  <div class="nav-tab" onclick="show('murid')">Murid</div>
  <div class="nav-tab" onclick="show('rekod')">Rekod</div>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <div class="card">
    <h3>📊 Dashboard</h3>
    <p>Sistem Rekod Khatam Al-Quran 2026</p>
  </div>
</div>

<!-- MURID -->
<div id="murid" class="page">
  <div class="card">
    <h3>👥 Senarai Murid</h3>
    <button class="btn btn-primary" onclick="alert('Tambah murid')">+ Tambah</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr><th>Nama</th><th>Status</th><th>Muka Surat</th></tr>
      </thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
</div>

<!-- REKOD -->
<div id="rekod" class="page">
  <div class="card">
    <h3>📝 Rekod</h3>
    <p>Modul rekod bacaan</p>
  </div>
</div>

<script>
let murid = [
  {nama:"Ahmad Aryan", status:"Aktif", ms:120},
  {nama:"Aina Insyirah", status:"Aktif", ms:450},
  {nama:"Muhammad Ikram", status:"Aktif", ms:300}
];

function render(){
  let html = murid.map(m=>`
    <tr>
      <td>${m.nama}</td>
      <td>${m.status}</td>
      <td>${m.ms}</td>
    </tr>
  `).join('');
  document.getElementById('tbl').innerHTML = html;
}
render();

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
